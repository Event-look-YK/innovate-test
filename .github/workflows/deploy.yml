name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io

jobs:
  build-push-server:
    name: Server — build, push & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push server image
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          TAG: ${{ github.sha }}
          DATABASE_URL: placeholder
          BETTER_AUTH_SECRET: placeholder-secret-at-least-32-chars-long
          BETTER_AUTH_URL: https://placeholder.example.com
          CORS_ORIGIN: https://placeholder.example.com
          GEMINI_API_KEY: placeholder
          VITE_SERVER_URL: https://placeholder.example.com
        run: |
          docker compose -f compose.yaml build server
          docker compose -f compose.yaml push server

      - name: Set secrets on server container app
        run: |
          SERVER_FQDN=$(az containerapp show \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          WEB_FQDN=$(az containerapp show \
            --name ${{ secrets.WEB_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          az containerapp secret set \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              database-url="${{ secrets.DATABASE_URL }}" \
              better-auth-secret="${{ secrets.BETTER_AUTH_SECRET }}" \
              better-auth-url="https://${SERVER_FQDN}" \
              cors-origin="https://${WEB_FQDN}" \
              gemini-api-key="${{ secrets.GEMINI_API_KEY }}"

      - name: Deploy server container app
        run: |
          az containerapp update \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/server:${{ github.sha }} \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              BETTER_AUTH_SECRET=secretref:better-auth-secret \
              BETTER_AUTH_URL=secretref:better-auth-url \
              CORS_ORIGIN=secretref:cors-origin \
              GEMINI_API_KEY=secretref:gemini-api-key \
              NODE_ENV=production

  build-push-web:
    name: Web — build, push & deploy
    runs-on: ubuntu-latest
    needs: build-push-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push web image
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          TAG: ${{ github.sha }}
          DATABASE_URL: placeholder
          BETTER_AUTH_SECRET: placeholder-secret-at-least-32-chars-long
          BETTER_AUTH_URL: https://placeholder.example.com
          CORS_ORIGIN: https://placeholder.example.com
          GEMINI_API_KEY: placeholder
        run: |
          SERVER_FQDN=$(az containerapp show \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          export VITE_SERVER_URL="https://${SERVER_FQDN}"
          docker compose -f compose.yaml build web
          docker compose -f compose.yaml push web

      - name: Deploy web container app
        run: |
          SERVER_FQDN=$(az containerapp show \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          az containerapp update \
            --name ${{ secrets.WEB_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/web:${{ github.sha }} \
            --set-env-vars \
              VITE_SERVER_URL=https://${SERVER_FQDN}

      - name: Print deployed URLs
        run: |
          SERVER_FQDN=$(az containerapp show \
            --name ${{ secrets.SERVER_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          WEB_FQDN=$(az containerapp show \
            --name ${{ secrets.WEB_APP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' --output tsv)
          echo "Server: https://${SERVER_FQDN}"
          echo "Web:    https://${WEB_FQDN}"
